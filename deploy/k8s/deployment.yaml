apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-web
  namespace: aegis
  labels:
    app: aegis-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-web
  template:
    metadata:
      labels:
        app: aegis-web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      containers:
        - name: web
          image: ghcr.io/OWNER/aegis-trust-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
              name: http
          envFrom:
            - secretRef:
                name: aegis-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3010"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
