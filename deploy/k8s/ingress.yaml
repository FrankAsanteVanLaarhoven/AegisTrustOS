apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-web
  namespace: aegis
  annotations:
    # Adjust for your ingress controller (nginx / ALB)
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - trust.example.com
      secretName: aegis-tls
  rules:
    - host: trust.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-web
                port:
                  number: 80
