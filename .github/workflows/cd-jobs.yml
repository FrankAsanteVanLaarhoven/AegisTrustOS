name: CD · Scheduled jobs

# Hourly expiry against DEPLOY_URL; outbox drain when DATABASE_URL is set.

on:
  schedule:
    - cron: "5 * * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: Which job
        type: choice
        options:
          - expiry
          - drain-outbox
          - both
        default: both

jobs:
  expiry:
    name: Credential expiry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.job == 'expiry' || github.event.inputs.job == 'both')
      || github.event_name == 'schedule'
    steps:
      - name: Call expiry API
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::notice::DEPLOY_URL not configured — skip"
            exit 0
          fi
          # Prefer hourly cron only for schedule events
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "5 * * * *" ]; then
            if [ "${{ github.event.schedule }}" = "*/15 * * * *" ]; then
              echo "Skipping expiry on 15m schedule"
              exit 0
            fi
          fi
          CODE=$(curl -s -o /tmp/out -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "X-Aegis-Cron: ${CRON_SECRET}" \
            "${DEPLOY_URL}/api/v1/ops/expiry")
          echo "HTTP $CODE"
          head -c 500 /tmp/out || true
          if [ "$CODE" != "200" ]; then
            echo "::error::Expiry failed with $CODE"
            exit 1
          fi

  drain:
    name: Drain outbox
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.job == 'drain-outbox' || github.event.inputs.job == 'both')
      || github.event_name == 'schedule'
    steps:
      - name: Check DATABASE_URL
        id: gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::DATABASE_URL not set — outbox drain skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: npm

      - name: Drain
        if: steps.gate.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Only run drain on 15m schedule or manual
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "5 * * * *" ]; then
            echo "Skipping drain on hourly schedule"
            exit 0
          fi
          npm ci
          npx prisma generate
          npm run job:drain-outbox
