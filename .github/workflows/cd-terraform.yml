name: CD · Terraform AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      environment:
        description: Environment name
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: cd-terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Gate secrets
        id: gate
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS_ACCESS_KEY_ID missing — configure AWS secrets for Terraform CD"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@v3
        if: steps.gate.outputs.skip != 'true'
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: steps.gate.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Terraform init
        if: steps.gate.outputs.skip != 'true'
        run: terraform init -input=false

      - name: Terraform plan
        if: steps.gate.outputs.skip != 'true'
        run: |
          terraform plan -input=false \
            -var="environment=${{ github.event.inputs.environment }}" \
            -out=tfplan
        env:
          TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
          TF_VAR_document_encryption_key: ${{ secrets.DOCUMENT_ENCRYPTION_KEY }}

      - name: Terraform apply
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Outputs
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.action == 'apply'
        run: terraform output -json | tee terraform-outputs.json

      - name: Upload outputs
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ github.event.inputs.environment }}
          path: deploy/terraform/terraform-outputs.json
