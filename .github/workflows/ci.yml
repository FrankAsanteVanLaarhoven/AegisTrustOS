name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate + push (SQLite)
        env:
          DATABASE_URL: file:./ci.db
        run: |
          npx prisma generate
          npx prisma db push --skip-generate

      - name: Unit tests
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
        run: npm test

      - name: Build
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
        run: npm run build

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Prisma + seed
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
          npm run db:seed

      - name: Start server
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
          NEXTAUTH_URL: http://localhost:3010
          PORT: "3010"
        run: |
          npm run build
          npm run start &
          echo $! > server.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3010/api/v1/health >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Smoke tests
        env:
          AEGIS_URL: http://localhost:3010
          DATABASE_URL: file:./ci.db
        run: npm run test:smoke

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke
          path: browser-test-results/
          if-no-files-found: ignore
